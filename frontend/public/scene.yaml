  lineHighlighted:
    base: lines
    blend: overlay
    color: [0.000, 0.000, 0.000, 1.00]
    width: [[9, 1.5px], [11, 2.0px], [12, 2.5px], [13, 3.0px], [15, 5px]]
    join: round
    cap: round
  ux-route-line-dirarrow-overlay:
    base: lines
    #blend_order: 1        
    #blend : overlay        
    texture: route_line_dirarrow
    texcoords: true
    tParams: true
    shaders:
      sysuniforms: #new thing added to directly update system uniforms from yaml
        u_texture_repeat_skip_count: 6.0
      blocks:
        global: |
          uniform float u_t_param;
        color: |
          // This function modifies the color based on the 't' value
          // Assuming v_color is the vertex color attribute and you pass 't' as a uniform          
          if (v_t < u_t_param) {
            // Before the 't' point - grey with 50% transparency
            color = vec4(0.5, 0.5, 0.5, 0.1);
          } else {
            // After the 't' point - maintain the original color fully opaque
            color = vec4(color.rgb, 1.0);
          }
  ux-route-line-overlay:
    base: lines
    #blend: opaque
    texcoords: true
    tParams: true
    shaders:
      blocks:
        global: |
          uniform float u_t_param;
        color: |
          // This function modifies the color based on the 't' value
          // Assuming v_color is the vertex color attribute and you pass 't' as a uniform                    
          if (v_t < u_t_param) {
            // Before the 't' point - grey with 15% transparency
            color = vec4(0.5, 0.5, 0.5, 0.30);
          } else {
            // After the 't' point - maintain the original color fully opaque
            color = vec4(color.rgb, 1.0);
          }       
  ux-route-line-overlay-unselected:
    base: lines
    blend: opaque
  ux-tracking-line-overlay:
    base: lines
    cap: round
    join: round
    blend: opaque
  ux-walk-line-overlay:
    base: lines
