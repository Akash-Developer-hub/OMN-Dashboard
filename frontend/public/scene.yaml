  elevation_raster:
    base: raster
    raster: custom
    shaders:
      uniforms:
        range0: [3.0, 0.0, 0.0, 1.0]
        range1: [10.0, 1.0, 0.0, 0.0]
        range2: [20.0, 0.0, 1.0, 0.0]
        range3: [40.0, 0.0, 0.0, 1.0]
        range4: [50.0, 1.0, 0.0, 1.0]
        range5: [80.0, 0.0, 1.0, 1.0]
        defaultColor: [0.0, 0.0, 0.0, 0.0]
        blendRange: false
        setAlpha: 1.0
      blocks:
        global: |
          float unpack(vec4 h) {
            vec3 adjustedHeight = vec3(h.r * 255.,h.g*255.,h.b);
            return ((adjustedHeight.r * 256. + adjustedHeight.g + (adjustedHeight.b / 256.))) - 32768.;
          }
        color: |
          float height = unpack(sampleRaster(0));
          float hillShadeAmount = sampleRaster(0).a;
          float contourLinesInMeters = .1;
          float blendFrac = 1.0;
          vec3 col2 = defaultColor.yzw;
          color.rgb = defaultColor.yzw;

          if( height <= range0.x ) {
            color.rgb = range0.yzw;
            blendFrac = 1.0;
            col2 = range0.yzw;            
          }
          if((height >= range0.x) && (height < range1.x) ) {
            color.rgb = range0.yzw;
            blendFrac = (height - range0.x)/(range1.x - range0.x);
            col2 = range1.yzw;            
          }
          if((height >= range1.x) && (height < range2.x) ) {
            color.rgb = range1.yzw;
            blendFrac = (height - range1.x)/(range2.x - range1.x);
            col2 = range2.yzw;            
          }
          if((height >= range2.x) && (height < range3.x) ) {
            color.rgb = range2.yzw;
            blendFrac = (height - range2.x)/(range3.x - range2.x);
            col2 = range3.yzw;            
          }
          if((height >= range3.x) && (height < range4.x) ) {
            color.rgb = range3.yzw;
            blendFrac = (height - range3.x)/(range4.x - range3.x);
            col2 = range4.yzw;            
          }
          if((height >= range4.x) && (height < range5.x) ) {
            color.rgb = range4.yzw;
            blendFrac = (height - range4.x)/(range5.x - range4.x);
            col2 = range5.yzw;          
          }
          if(height >= range5.x && range5.x > 0.0) {
            color.rgb = range5.yzw;
            blendFrac = 1.0;
            col2 = range5.yzw;
          }


          if(blendRange == true) {
            color.rgb = color.rgb * (1.0 - blendFrac) + col2 *(blendFrac);
          }          
          /* //contour lines commented out
          vec3 f  = fract ( vec3(height,height,height) * contourLinesInMeters) ;
          vec3 df = fwidth( vec3(height,height,height) * contourLinesInMeters);
          float gwidth = 1.0;
          vec3 step1 = smoothstep(-df *2.0, df * 2.0, f);
          //vec3 step2 = smoothstep(df * 2.0, df * 3.0, f);
          //vec3 step3 = smoothstep(df * 1.0, df * 16.0, f);
          float step = step1.x;//*step2.x;// *step3.x;
          if( !(step == 0.0 || step == 1.0) && df.x > 0.0 ) {
            color.rgba = vec4(1.0, 1.0, 1.0, setAlpha);            
          }
          else {
            color.rgb = color.rgb * vec3(hillShadeAmount + 0.5);
            color.a = setAlpha;
          }*/
          color.rgb = color.rgb * vec3(hillShadeAmount + 0.5);
          color.a = setAlpha;

  rail-dash:
    base: lines
    texcoords: true
    shaders:
      defines:
        DASH_SIZE: .9
        DASH_SCALE: .6
      blocks:
        filter: |
          if (step(DASH_SIZE, fract(v_texcoord.y * DASH_SCALE)) == 0.)
          {
          discard;
          }
  lines-road:
    base: lines
  lines-case:
