global:
  default_text_source: |
    function() {
      if (feature.ref && feature.name ) { return feature.ref +" " + feature.name_en      ; } else if (feature.name_en      ) { return feature.name_en      ; } else { return feature.ref; }
    }
  name_source: |
    function() {
      if (feature.name_en      ) { return feature.name_en      ; } else if (feature.name) { return feature.name; }
    }  
  house_number: |
    function() {
      { return feature.housenumber; }
    }  
  refn_source: |
    function() {
        if (feature.name_en      ) { return feature.name_en      ; } else if (feature.name) { return feature.name; } else if (feature.ref) { return feature.ref; }
    }
  elev_source: |
    function() {
      if(feature.elev) { return feature.elev + "m"; } else { return ""; }
    }
  get_elevMax_from_tile: |
    function() { return 4; }  
