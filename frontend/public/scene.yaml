          draw:
            points:
              placement: midpoint
              placement_min_length_ratio: [[6, 0.3], [11, 1.0], [14, 1.4], [16, 8.0],
                [20, 20.0]]
              #size: [[6, 10px], [14, 20px]]  # Adjust the size as necessary                    
