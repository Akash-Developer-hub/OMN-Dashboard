  ux-walk-line-border-overlay:
    base: lines
    blend: overlay
    texcoords: true
    shaders:
      defines:
        BORDER_WIDTH: .1
      blocks:
        filter: |
          if (v_texcoord.x > BORDER_WIDTH && v_texcoord.x < 1.0-BORDER_WIDTH)
          {
          discard;
          }
  ux-transit-line-overlay:
    base: lines
  poi3d:
    base: points
    texture: pois
    interactive: true
  buildings-base:
    base: polygons
    blend: translucent
    shaders:
      uniforms:
        u_highlightColor: [1.0, 1.0, 0.0, 0.8]  # Red highlight with 80% alpha
      blocks:
        color: |
          if (int(v_osm_id) == 1) {
              // Blend the highlight color with the base color
              color.rgb = mix(color.rgb, u_highlightColor.rgb, u_highlightColor.a);
              // Apply highlight alpha blending
              color.a = mix(color.a, u_highlightColor.a, u_highlightColor.a * 0.5);
          }
  buildings-animated:
    base: polygons
    blend: translucent
    shaders:
      attributes:
        base_h: {type: float}
      uniforms:
        u_extrude_duration: 1.0
        u_globalDirectionalLight: [0.0, 0.0, 1.0]
        u_transparencyParams: [0.05, 0.5, 1000.0, 0.0]
        u_highlightColor: [1.0, 1.0, 0.0, 0.8]  # Red highlight with 80% alpha
      blocks:
        position: |
          // progress since later of (tile birth, extrude enable)
          float t = clamp((u_time - max(u_tile_birth,u_extrude_epoch)) / u_extrude_duration, 0.0, 1.0);
          // smoothstep ease-in-out
          float s = t * t * (3.0 - 2.0 * t);
          // anchor bottoms at 0; grow top to final Z
          position.z = position.z * s;
        color: |-
          float normdot = dot(worldNormal(), u_globalDirectionalLight);
          if (normdot < 0.0) { normdot = 0.0; }
          normdot = sqrt(normdot * normdot);
          float xcomp = dot(worldNormal(), vec3(1.0, 0.0, 0.0));
          float ycomp = dot(worldNormal(), vec3(0.0, 1.0, 0.0));
          color.rgb = color.rgb * normdot + (0.1 * xcomp + 0.1 * ycomp + 0.7) * color.rgb;
          // Get the camera position from the inverse of the view matrix
          mat4 invView = u_inverseView;
          vec3 cameraPosition = vec3(invView[3]);          
          // Map the distance to a transparency value using the parameters from u_transparencyParams
          float transparency = mix(u_transparencyParams.x, u_transparencyParams.y, clamp(cameraPosition.z / u_transparencyParams.z, u_transparencyParams.w, 1.0));
          color.a = transparency;

          // Apply highlighting if this feature's OSM ID matches the highlighted one
          if (int(v_osm_id) == 1) {
              // Blend the highlight color with the base color
              color.rgb = mix(color.rgb, u_highlightColor.rgb, u_highlightColor.a);
              // Apply highlight alpha blending
              color.a = mix(color.a, u_highlightColor.a, u_highlightColor.a * 0.5);
          }
