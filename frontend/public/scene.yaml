    interactive: true
    data: {source: poi, layer: poi}
    building3d:
      filter:
        all:
        - $geometry: point
        - class: [custom]
        - $zoom: {min: 16}
      draw:                
        poi3d:        
          order: 99
          sprite: function() { return "" + feature.class + ""; }
          collide: true
          anchor: top              
          text:            
            text_source: global.name_source
            collide: true
            anchor: bottom
            priority: 10
            font:
              family: NEFontMainA
              size: '12'
              fill: [0.000, 0.000, 0.000, 1.00]
              stroke:
                color: [1.000, 1.000, 1.000, 1.00]
