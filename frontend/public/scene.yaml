styles:
  building_transparent:
      base: polygons
      blend: translucent
      lighting: false
      material:
          ambient: [0.78, 0.76, 0.70]
          diffuse: [0.92, 0.90, 0.84]
          specular: [0.08, 0.08, 0.06]
          shininess: 4.0
      shaders:
          blocks:
            color: |
              // If the normal is pointing up (Z axis), it's a roof. Make it opaque.
              if (worldNormal().z > 0.9) {
                  color.a = 1.0; 
              }
  pedestrian_zebra:
      base: polygons
      texcoords: true
      blend: translucent
      shaders:
        uniforms:
          u_stripe_color: [1.0, 1.0, 1.0, 0.7]
          u_stripe_scale: 14.0
          u_stripe_width: 0.55
        blocks:
          color: |
            float t = fract(v_texcoord.x * u_stripe_scale);
            float band = 1.0 - step(u_stripe_width, t);
            color = vec4(u_stripe_color.rgb, u_stripe_color.a * band);
  building_solid_roof:
    base: polygons
    lighting: false
    blend: translucent
    material:
      ambient: [0.78, 0.76, 0.70]
      diffuse: [0.92, 0.90, 0.84]
      specular: [0.08, 0.08, 0.06]
      shininess: 4.0
    shaders:
      blocks:
        color: |
          // If the normal is pointing up (Z axis), it's a roof. Make it opaque.
          if (worldNormal().z > 0.9) {
              color.a = 1.0; 
          }
  navicon:
    base: points
    blend: overlay
    blend_order: 9
    order: 495
  locationicon:
    base: points
    blend: overlay
    blend_order: 8
  marker:
    base: points
    blend: overlay
    blend_order: 8
  nemarker:
    base: points
    blend: overlay
    blend_order: 8
  dbgmarker:
    base: points
    blend: overlay
    blend_order: 101
  heightglowline:
    base: lines
  heightglow:
    base: polygons
    lighting: vertex
    shaders:
      blocks:
        color: color.rgb += vec3(worldPosition().z / 800.);
  buildingVertexShaded:
    base: polygons
    lighting: vertex
    blend: opaque
    shaders:
      uniforms:
        u_globalDirectionalLight: [.0, .0, 1.0]
      blocks:
        color: float normdot = dot(worldNormal(), u_globalDirectionalLight ); if (normdot
          < 0.0) { normdot = 0.0;} ; normdot = sqrt(normdot*normdot); float xcomp
          = dot(worldNormal(), vec3(1.0, 0.0, 0.0) ); float ycomp = dot(worldNormal(),
          vec3(0.0, 1.0, 0.0) ); color.rgb = color.rgb*(normdot) + (0.1*xcomp + 0.1*ycomp
          + 0.7)*color.rgb; color.a = 1.0;
  buildingVertexShadedWithTransparency:
    base: polygons
    lighting: vertex
    blend: translucent
    shaders:
      uniforms:
        u_globalDirectionalLight: [0.0, 0.0, 1.0]
        u_transparencyParams: [0.05, 0.5, 1000.0, 0.0]
      blocks:
        color: |-
          float normdot = dot(worldNormal(), u_globalDirectionalLight);
          if (normdot < 0.0) { normdot = 0.0; }
          normdot = sqrt(normdot * normdot);
          float xcomp = dot(worldNormal(), vec3(1.0, 0.0, 0.0));
          float ycomp = dot(worldNormal(), vec3(0.0, 1.0, 0.0));
          color.rgb = color.rgb * normdot + (0.1 * xcomp + 0.1 * ycomp + 0.7) * color.rgb;
          // Get the camera position from the inverse of the view matrix
          mat4 invView = u_inverseView;
          vec3 cameraPosition = vec3(invView[3]);          
          // Map the distance to a transparency value using the parameters from u_transparencyParams
          float transparency = mix(u_transparencyParams.x, u_transparencyParams.y, clamp(cameraPosition.z / u_transparencyParams.z, u_transparencyParams.w, 1.0));
          color.a = transparency;
  routearrowstyle:
    base: polygons
    lighting: vertex
    blend: overlay
    blend_order: 98
    shaders:
      blocks:
        color: float normdot = dot(worldNormal(), vec3(0.0,0.0,1.0) ); normdot = sqrt(normdot*normdot);
          color.rgb = 2.0*color.rgb*normdot ;
  navigation_icon:
