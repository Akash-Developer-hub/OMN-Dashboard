  roads_hack:
    data: {source: main, layer: roads}
    roaddetails:
      enabled: true
      arrows:
        filter: {oneway: yes, not: {brunnel: [tunnel]}, $zoom: {min: 17}}
        draw:
          points:
            texture: road_arrow
            flat: true
            size: [[16, 11px], [16, 13px], [17, 0px]]
            placement: vertex
            angle: auto
            blend: inlay
            blend_order: 2
            color: |
              function() {
                if (feature.class == 'motorway') {
                  return '#ADD8E6';  // Light Blue
                } else if (feature.class == 'trunk') {
                  return '#90EE90';  // Light Green
                } else if (feature.class == 'primary') {
                  return '#FF7F7F';  // Light Red
                } else if (feature.class == 'secondary') {
                  return '#FFA07A';  // Light Orange
                } else if (feature.class == 'tertiary') {
                  return '#FFFFE0';  // Light Yellow
                } else {
                  return '#D3D3D3';  // Light Gray
                }
              }
  roads:
    interactive: true
